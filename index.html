<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Bray Schurman</title>
    <meta name="description" content="Bray Schurman">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Karla:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<style>
    html {
        background-color: whitesmoke;
        color: #333333;
    }

    body {
        font-family: 'Karla', sans-serif;
    }

    #wrap {
        display: flex;
        flex-wrap: wrap;
        margin: 0% 20% 10% 20%;
    }

    #mainPic {
        width: 100%;
    }

    .mediaBorder {
        border-radius: 12px;
    }

    .compContainer {
        width: 100%;
        display: flex;
        justify-content: center;
    }

    .sectionContainer {
        width: 100%;
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        text-align: center;
        margin: 10px 0px 20px 0px;
    }


    .horizontal {
        margin: 20px 0px 10px 0px;
        color: lightgray;
        width: 66%;
    }

    /* Smartphones (portrait and landscape) ----------- */
    @media only screen and (min-width : 320px) and (max-width : 480px) {
        /* Styles */
    }

    /* Smartphones (landscape) ----------- */
    @media only screen and (min-width : 321px) {
        /* Styles */
    }

    /* Smartphones (portrait) ----------- */
    @media only screen and (max-width : 320px) {
        /* Styles */
    }

    /* iPads (portrait and landscape) ----------- */
    @media only screen and (min-width : 768px) and (max-width : 1024px) {
        #wrap {
            margin: 0% 15% 10% 15%;
        }
    }

    /* Desktops and laptops ----------- */
    @media only screen and (min-width : 1224px) {
        #wrap {
            margin: 0% 25% 10% 25%;
        }
    }

    /* Large screens ----------- */
    @media only screen and (min-width : 1824px) {
        #wrap {
            margin: 0% 30% 10% 30%;
        }
    }

    /* iPhone 4 ----------- */
    @media only screen and (-webkit-min-device-pixel-ratio : 1.5),
    only screen and (min-device-pixel-ratio : 1.5) {
        /* Styles */
    }

<body>
    <div id="wrap">
        <h2>Bray Schurman</h2>
        <div class="compContainer">
            <img style="width:100%;" class="mediaBorder" src="./brayschurman.png" alt="Bray Schurman">
        </div>

        <div class="compContainer">
            <p style="width: 100%;"><strong>Bray Schurman</strong> is a music producer, writer, and
                multi-instrumentalist. Check out some of
                his
                music below. He'd love to work on your next project. Bray can be contacted through email at
                braytheproducer@gmail.com.
            </p>
        </div>

        <div class="compContainer">
            <hr class="horizontal">
        </div>


        <div class="sectionContainer">
            <h4 style="width: 100%; margin: 0;">Bray Schurman</h4>
            <small style="width: 100%;">Playlist</small>
        </div>

        <div class="compContainer">
            <iframe class="mediaBorder"
                src="https://open.spotify.com/embed/playlist/7meDNszByT9O7PJ7gfgCYN?utm_source=generator" width="100%"
                height="380" frameBorder="0" allowfullscreen=""
                allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy">
            </iframe>

        </div>

        <div class="compContainer">
            <hr class="horizontal">
        </div>

        <div class="sectionContainer">
            <h4 style="width: 100%; margin: 0;">Contact</h4>
            <div id="emailDiv" style="width: 100%; text-decoration: underline;">braytheproducer@gmail.com</div>
        </div>
    </div>
